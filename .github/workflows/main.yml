name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Resolve o aviso de depreciação do Node.js 20
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: |
          # Comando para encontrar onde o arquivo está e entrar na pasta antes do build
          FILE_PATH=$(find . -name "AnaliseDash.py" -print -quit)
          DIR_PATH=$(dirname "$FILE_PATH")
          cd "$DIR_PATH"
          flet build apk AnaliseDash.py

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-skins-dash
          # Busca o APK onde quer que ele tenha sido gerado
          path: "**/build/apk/*.apk"
