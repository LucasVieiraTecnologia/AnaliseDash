name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Necessário para o Gradle moderno

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Versão estável para build de apps

      - name: Install Dependencies
        run: |
          pip install flet
          
      - name: Build APK
        # IMPORTANTE: Verifique se o nome do seu arquivo é kmeans.py ou main.py
        run: flet build apk --target kmeans.py

      - name: Upload APK
        uses: actions/upload-artifact@v4 # VERSÃO CORRIGIDA AQUI
        with:
          name: calculadora-skins-dash
          path: build/apk/*.apk
