name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Prepare and Build
        run: |
          # Criando o main.py a partir do seu arquivo AnaliseDash.py
          cp AnaliseDash.py main.py
          
          # Iniciando o build no diretório atual
          flet build apk .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-skins-dash
          path: "**/build/apk/*.apk"
